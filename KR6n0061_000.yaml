front:
  text: 攝大乘論釋序十五卷成大唐桑門道基撰攝大乘論者蓋是希聲大教至理幽微超眾妙之門閉邪論之軌大士所作其在茲乎若夫實相宗極言亡而慮斷真如體妙道玄而理邈壯哉法界廓爾無為信矣大方超然域外是以王城三止寶殿三加至人垂範良有以也佛去世後千一百餘載群機將扣感而遂通北天竺國有二開士結師資而接武連花萼以承芳無著闡於紘綱所以俊撰論本婆藪揚其名理所以克精注述諸論宗歸所明各異法華論旨引三車而共轍鞞沙幽致開十住以同階至如此論眾名坦蕩似王路之無枝藏識常流譬洪川之長注三性殊旨混為一心六度虛宗俱拪彼岸躡十地之龍級淤三學之夷路涅槃無處運悲慧之兩融菩提圓極齊真應之一揆言攝大乘者攝謂能攝蘊積苞含攝藏名攝言大乘者理必絕待假大稱之名曰大乘其義廓周體性該博謂為大也所行功德能至能證名之為乘論者無著菩薩之所製造窮源盡理清微朗暢謂為論也釋者婆藪論師之所注解清辯剖扸文理俱騰其為釋焉以梁太清二年南身毒優禪尼國有真諦三藏道超世表學冠群英以法濟時來儀建業屬梁季將潰旋路嶺南廣州刺史陽山公歐陽頠屈請停止為菩薩戒師世子衡州刺史歐陽紇復請翻譯有丹陽義學僧僧宗慧愷傳語筆受任得其人論本釋論十有五卷余以庸淺鑽仰無墜聊述所聞以示來哲豫章郡守王欽開皇元年五月奏此論與遷持論不殊攝大乘論釋序遷禪師江南將至徐州講唱夫至道弘曠無思不洽大悲平等誘進靡窮德被含生理非偏漏但迷塗易久淪惑難息若先談出世則疑性莫啟故設教立方各隨性欲唐虞之前圖諜簡少姬周以後經誥弘多雖復製禮作訓並導之以俗法而真假妙趣尚冥然未覩故迹隱葱嶺已西教祕滄海之外自漢室受命方稍東漸爰及晉朝斯風乃盛梁有天下彌具興隆歷千祀其將半涉七代而迄今法蘭導清源於前童壽振芳塵於後安叡騁壯思以發義端生肇擅玄言以釋幽致雖並策分鑣同瀾比派而深淺競馳照晦相雜自茲以降篤好愈廣莫不異軌同奔傳相祖習而去取隨情開抑殊軫慧愷志慚負槖勤愧聚螢謬得齒迹學徒稟承訓義遊寓講肆多歷年所名師勝友備得諮詢但綜涉疎淺鑽仰無術尋波討源多所未悟此蓋慮窮於文字思迷於弘旨明發興嗟負心非一每欲順風問道而未知厥路有三藏法師是優禪尼國婆羅門種姓頗羅墮名拘羅那他此土翻譯稱曰親依識鑒淵曠風表俊越天才高傑神辯閑縱道氣逸群德音邁俗少遊諸國歷事眾師先習外典備通書奧苞四韋於懷抱吞六論於胸衿學窮三藏貫練五部研究大乘備盡深極法師既博綜墳籍妙達幽微每欲振玄宗於他域啟法門於未悟以身許道無憚遠遊跨萬里猶比隣越四海如咫尺以梁太清二年方屆建業仍值梁季混淆橫流荐及法師因此避地東西遂使大法擁而不暢末至九江及遊五嶺凡所翻譯卷軸未多後適閩越敷說不少法師每懷慷慨所歎知音者希故伯牙絕絃卞和泣璧良由妙旨之曲難辯盈尺之珍罕別法師遊方既久欲旋反舊國經塗所亘遂達蕃禺儀同三司廣州刺史陽山郡公歐陽頠叡表岳靈德洞河府經文緯武匡道佐時康流民於百越建正法於五嶺欽法師之高行慕大士之勝規奉請為菩薩戒師恭承盡弟子禮愷昔甞受業已少滌沈弊服膺未久便致睽違今重奉值倍懷蹈舞復欲飡和稟德訪道陳疑雖慇懃三請而不蒙允遂怳然失圖心魂靡託衡州刺史陽山公世子歐陽紇風業峻整威武貞拔該閱文史深達治要崇瀾內湛清輝外溢欽賢味道篤信愛奇躬為請主兼申禮事法師乃欣然受請許為翻譯制旨寺主慧智法師戒行清白道氣宏壯志業閑贍觸途必舉匡濟不窮輪煥靡息征南長史袁敬德履行沖明志託夷遠徽猷清蘭氷桂齊質弼諧蕃政民譽早聞兼深重佛法崇情至理黑白二賢為經始檀越辰次昭陽歲維協洽月呂姑洗神紀勾芒於廣州制旨寺便就翻譯法師既妙解聲論善識方言詞有以而必彰義無微而不暢席間函丈終朝靡息愷謹筆受隨出隨書一章一句備盡研覈釋義若竟方乃著文然翻譯事殊難不可存於華綺若一字參差則理趣胡越乃可令質而得義不可使文而失旨故今所翻文質相半與僧忍等同共稟學夙夜匪懈無棄寸陰即以其年樹檀之月文義俱竟本論三卷釋論十二卷義疏八卷合二十三卷此論乃是大乘之宗極正法之祕奧妙義雲興清詞海溢深固幽遠二乘由此迷墜曠壯該含十地之所宗學如來滅後將千一百餘年彌勒菩薩投適時機降靈俯接忘己屈應為阿僧伽法師廣釋大乘中義阿僧伽者此言無著法師得一會道體二居宗詠玄鑒極凝神物表欲敷闡至理故製造論唯識微言因茲得顯三性妙趣由此而彰冠冕彜倫舟航有識本論即無著法師之所造也法師次弟婆藪槃豆此曰天親道亞生知德備藏性風格峻峙神氣爽發稟厥兄之雅訓習大乘之弘旨無著法師所造諸論詞致淵玄理趣難曉將恐後生復成紕紊故製釋論以解本文籠小乘於形內挫外道於筆端自斯以後迄于像季方等圓教乃盛宣通慧愷不揆虛薄情慮庸淺乃欲泛芥舟於巨壑策駘足於長路庶累毫成仞聚爝為明有識君子幸宜尋閱其道必然無失墜也
